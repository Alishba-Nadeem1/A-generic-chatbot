<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Desk — Support that understands you</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f6f6f5;
    --ink: #0d0d0f;
    --muted: #6b6b70;
    --blue: #3b5cff;
    --blue-soft: #8fa8ff;
    --panel: #111114;
    --panel-border: #2a2a30;
    --panel-input: #1a1a1f;
    --bot-bubble: #1c1c22;
    --user-bubble: #2b46e0;
  }

  * { box-sizing: border-box; }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }

  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  .page {
    max-width: 760px;
    margin: 0 auto;
    padding: 90px 24px 100px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .eyebrow {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
  }

  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: clamp(30px, 5vw, 46px);
    line-height: 1.15;
    letter-spacing: -0.01em;
    margin: 0 0 20px;
    max-width: 640px;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.1s forwards;
  }

  .sub {
    font-size: 17px;
    color: var(--muted);
    max-width: 480px;
    line-height: 1.55;
    margin: 0;
    opacity: 0;
    animation: fadeUp 0.7s ease 0.2s forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .glow-wrap {
    position: relative;
    width: 100%;
    height: 130px;
    margin-top: 10px;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.3s forwards;
  }

  .glow {
    position: absolute;
    left: 50%;
    top: 0;
    transform: translateX(-50%);
    width: 480px;
    height: 260px;
    background: radial-gradient(ellipse at center, rgba(59,92,255,0.55) 0%, rgba(59,92,255,0.28) 35%, rgba(59,92,255,0) 70%);
    filter: blur(6px);
    pointer-events: none;
    animation: pulse 5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.85; }
    50% { opacity: 1; }
  }

  .window {
    width: 100%;
    max-width: 620px;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 30px 60px -20px rgba(59,92,255,0.25), 0 10px 30px -10px rgba(0,0,0,0.5);
    opacity: 0;
    animation: fadeUp 0.8s ease 0.35s forwards;
  }

  .window__bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    background: #17171b;
    border-bottom: 1px solid var(--panel-border);
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }
  .dot--red { background: #ff5f57; }
  .dot--yellow { background: #febc2e; }
  .dot--green { background: #28c840; }

  .window__tab {
    margin-left: 12px;
    font-size: 12.5px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .live-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #28c840;
    box-shadow: 0 0 6px #28c840;
  }

  .chat {
    height: 420px;
    overflow-y: auto;
    padding: 20px 18px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    text-align: left;
  }

  .msg {
    max-width: 80%;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .msg--bot { align-self: flex-start; }
  .msg--user { align-self: flex-end; align-items: flex-end; }

  .bubble {
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.5;
  }
  .msg--bot .bubble {
    background: var(--bot-bubble);
    color: #e8e8ec;
    border-bottom-left-radius: 4px;
  }
  .msg--user .bubble {
    background: var(--user-bubble);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .meta {
    font-size: 10.5px;
    color: #55555c;
    padding: 0 4px;
  }

  .chat-input {
    display: flex;
    border-top: 1px solid var(--panel-border);
    background: var(--panel-input);
  }

  .chat-input input {
    flex: 1;
    border: none;
    background: transparent;
    padding: 14px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: #f0f0f2;
    outline: none;
  }
  .chat-input input::placeholder { color: #6b6b70; }

  .chat-input button {
    border: none;
    background: var(--blue);
    color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 13px;
    padding: 0 22px;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .chat-input button:hover { background: #2c46e8; }

  .typing {
    align-self: flex-start;
    font-size: 11.5px;
    color: #6b6b70;
    padding-left: 2px;
  }

  .chat::-webkit-scrollbar { width: 8px; }
  .chat::-webkit-scrollbar-thumb { background: #2a2a30; border-radius: 4px; }

  .footer-note {
    margin-top: 24px;
    font-size: 12.5px;
    color: #9a9a9f;
    opacity: 0;
    animation: fadeUp 0.8s ease 0.45s forwards;
  }

  @media (max-width: 640px) {
    .page { padding: 60px 18px 70px; }
    .chat { height: 380px; }
  }
</style>
</head>
<body>

<div class="page">
  <div class="eyebrow">Customer Support, Reimagined</div>
  <h1>A support agent that actually understands what you're saying</h1>
  <p class="sub">No scripts. No rigid menus. Just a real conversation — grounded in your orders, policies, and products.</p>

  <div class="glow-wrap">
    <div class="glow"></div>
  </div>

  <div class="window">
    <div class="window__bar">
      <div class="dot dot--red"></div>
      <div class="dot dot--yellow"></div>
      <div class="dot dot--green"></div>
      <div class="window__tab"><span class="live-dot"></span> Support Desk — Live Chat</div>
    </div>
    <div class="chat" id="chatBody"></div>
    <div class="chat-input">
      <input type="text" id="userInput" placeholder="Ask about an order, refund, or product..." autocomplete="off">
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <div class="footer-note">Session #<span id="sessionLabel"></span></div>
</div>

<script>
  const API_URL = "http://localhost:8000/chat";
  const sessionId = Math.random().toString(36).slice(2, 8);
  document.getElementById("sessionLabel").textContent = sessionId.toUpperCase();

  const chatBody = document.getElementById("chatBody");
  const input = document.getElementById("userInput");
  const sendBtn = document.getElementById("sendBtn");

  function addMessage(text, sender, meta) {
    const wrap = document.createElement("div");
    wrap.className = "msg msg--" + sender;

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;
    wrap.appendChild(bubble);

    if (meta) {
      const metaEl = document.createElement("div");
      metaEl.className = "meta";
      metaEl.textContent = meta;
      wrap.appendChild(metaEl);
    }

    chatBody.appendChild(wrap);
    chatBody.scrollTop = chatBody.scrollHeight;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    const typingEl = document.createElement("div");
    typingEl.className = "typing";
    typingEl.textContent = "agent is typing...";
    chatBody.appendChild(typingEl);
    chatBody.scrollTop = chatBody.scrollHeight;

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, session_id: sessionId })
      });
      const data = await res.json();
      typingEl.remove();
      const meta = data.used_order_lookup ? "order data looked up" : null;
      addMessage(data.reply, "bot", meta);
    } catch (err) {
      typingEl.remove();
      addMessage("Connection error — is the backend running on localhost:8000?", "bot");
    }
  }

  sendBtn.addEventListener("click", sendMessage);
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") sendMessage(); });

  addMessage("Hello! Welcome to Support Desk. How can I help you today?", "bot");
</script>

</body>
</html>
